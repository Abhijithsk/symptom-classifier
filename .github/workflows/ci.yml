name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  docker:
    name: Build & Smoke Test Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t symptom-classifier:${{ github.sha }} .

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name sc symptom-classifier:${{ github.sha }}
          sleep 5

      - name: Smoke test /health endpoint
        run: |
          curl -f http://localhost:8000/health

      - name: Smoke test /predict endpoint
        run: |
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"symptoms": "fever headache chills"}'

      - name: Stop container
        run: docker stop sc
